<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skylapse</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #ddd; }
    h1 { font-size: 18px; margin: 0; }
    main { display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px; }
    #latest { display: flex; flex-direction: column; gap: 8px; }
    #latest img { max-width: 100%; height: auto; border-radius: 6px; border: 1px solid #ddd; background: #f8f8f8; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; background: #fff; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input[type="password"], input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 10px; border: 1px solid #888; border-radius: 6px; background: #f2f2f2; cursor: pointer; }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    small.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>Skylapse</h1>
    <div>
      <button id="refresh">Refresh</button>
    </div>
  </header>
  <main>
    <section id="latest">
      <div class="card">
        <h2 style="margin-top:0">Latest</h2>
        <div id="latest-meta" style="font-size:13px;color:#555"></div>
        <img id="latest-img" alt="Latest" />
      </div>
    </section>
    <aside>
      <div class="card" style="margin-bottom:12px">
        <h3 style="margin-top:0">Focus</h3>
        <div id="score-line" style="font-size:22px; font-weight:600; margin-bottom:6px;">Score: —</div>
        <div style="display:flex; gap:8px; margin-top:4px; flex-wrap:wrap">
          <button id="btn-capture">Capture + Compute (C)</button>
          <button id="btn-focus">Recompute (R)</button>
          <button id="btn-auto">Auto: Off (A)</button>
          <button id="btn-login">Login</button>
          <button id="btn-logout" disabled>Logout</button>
        </div>
        <div id="admin-out" style="margin-top:8px; font-size:12px"></div>
      </div>
      <div class="card">
        <h3 style="margin-top:0">Recent</h3>
        <ul id="recent"></ul>
      </div>
    </aside>
  </main>
  <dialog id="login-modal">
    <form method="dialog" style="min-width:320px">
      <h3>Login</h3>
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" />
      <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end">
        <button id="login-cancel" value="cancel">Cancel</button>
        <button id="login-submit" value="confirm">Login</button>
      </div>
      <div id="login-error" style="color:#b00; margin-top:8px; font-size:12px"></div>
    </form>
  </dialog>
  <script>
    const $ = (s)=>document.querySelector(s);
    const latestImg = $('#latest-img');
    const latestMeta = $('#latest-meta');
    const recentList = $('#recent');
    const out = $('#admin-out');
    const scoreLine = $('#score-line');
    const dlg = $('#login-modal');
    const loginErr = $('#login-error');
    let auto = false;
    let autoTimer = null;

    async function getJSON(url, opts={}) {
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return await r.json();
    }

    async function postJSON(url, body) {
      const r = await fetch(url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body||{}) });
      if (!r.ok) throw new Error(`${r.status}`);
      return await r.json();
    }

    async function loadLatest() {
      try {
        const data = await getJSON('/api/latest');
        if (data && data.image_url) {
          latestImg.src = data.image_url + `?t=${Date.now()}`;
          latestMeta.textContent = `Captured: ${data.captured_at ?? 'unknown'}`;
        } else {
          latestImg.removeAttribute('src');
          latestMeta.textContent = 'No image available';
        }
      } catch (e) {
        latestMeta.textContent = 'Failed to load latest';
      }
    }

    async function loadRecent() {
      try {
        const q = new URLSearchParams({ page: '1', page_size: '10' });
        const data = await getJSON('/api/images?' + q.toString());
        recentList.innerHTML = '';
        (data.items || []).forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${item.url}" target="_blank">${item.url}</a><br/><small class="mono">${new Date(item.captured_at*1000).toISOString()}</small>`;
          recentList.appendChild(li);
        });
      } catch (e) {
        recentList.innerHTML = '<li>Failed to load</li>';
      }
    }

    async function callAdmin(path, method='GET') {
      out.textContent = '';
      try {
        const r = await fetch(path, { method });
        const text = await r.text();
        try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
        catch { out.textContent = text; }
        await loadLatest();
        await loadRecent();
        if (path.includes('focus')) { try { updateScore(JSON.parse(text)); } catch{} }
      } catch (e) {
        if (e.message.startsWith('401')) showLogin(); else out.textContent = 'Request failed';
      }
    }

    function badge(color){ return `<span style="background:${color};color:#fff;padding:2px 6px;border-radius:6px;font-size:12px;margin-left:6px">${color.toUpperCase()}</span>`; }
    function updateScore(data){
      if (!data || data.score == null){ scoreLine.textContent = 'Score: —'; return; }
      const s = Number(data.score);
      let color = '#d33'; if (s>300) color='#2b8a3e'; else if (s>=100) color='#ca8a04';
      scoreLine.innerHTML = `Score: ${s.toFixed(1)} ${badge(color)}`;
    }

    async function computeScore(){
      try { const data = await getJSON('/api/admin/focus_score'); updateScore(data); }
      catch (e){ if (e.message.startsWith('401')) showLogin(); }
    }

    function startAuto(){ auto=true; $('#btn-auto').textContent='Auto: On (A)'; autoTimer=setInterval(async()=>{ await computeScore(); await loadLatest(); }, 2000); }
    function stopAuto(){ auto=false; $('#btn-auto').textContent='Auto: Off (A)'; if (autoTimer) clearInterval(autoTimer); }
    function toggleAuto(){ auto?stopAuto():startAuto(); }

    function showLogin(){ loginErr.textContent=''; dlg.showModal(); $('#password').focus(); }
    async function doLogin(){
      loginErr.textContent='';
      try { await postJSON('/api/login', { password: $('#password').value }); dlg.close(); $('#btn-logout').disabled=false; await computeScore(); }
      catch { loginErr.textContent='Invalid password'; }
    }
    async function doLogout(){ try { await postJSON('/api/logout', {}); $('#btn-logout').disabled=true; stopAuto(); out.textContent=''; scoreLine.textContent='Score: —'; } catch {}
    }

    $('#refresh').addEventListener('click', ()=>{ loadLatest(); loadRecent(); });
    $('#btn-capture').addEventListener('click', async()=>{ await callAdmin('/api/admin/capture_once','POST'); await computeScore(); });
    $('#btn-focus').addEventListener('click', ()=>computeScore());
    $('#btn-auto').addEventListener('click', ()=>toggleAuto());
    $('#btn-login').addEventListener('click', ()=>showLogin());
    $('#btn-logout').addEventListener('click', ()=>doLogout());
    $('#login-submit').addEventListener('click', (e)=>{ e.preventDefault(); doLogin(); });
    $('#login-cancel').addEventListener('click', ()=>dlg.close());
    window.addEventListener('keydown', (e)=>{
      if (e.key==='c' || e.key==='C') $('#btn-capture').click();
      if (e.key==='r' || e.key==='R') $('#btn-focus').click();
      if (e.key==='a' || e.key==='A') $('#btn-auto').click();
    });

    loadLatest();
    loadRecent();
    computeScore();
  </script>
</body>
</html>
