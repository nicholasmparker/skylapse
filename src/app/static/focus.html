<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skylapse • Focus</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
    header { position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #ddd; backdrop-filter: blur(6px); background: color-mix(in oklab, Canvas 85%, transparent); }
    main { display:grid; grid-template-columns: 1fr 360px; gap:16px; padding:16px; }
    .panel { border:1px solid rgba(0,0,0,.15); border-radius:8px; padding:12px; background: Canvas; color: CanvasText; }
    #image { max-width:100%; height:auto; border-radius:8px; border:1px solid #ddd; background:#000; }
    #score { font-size:40px; font-weight:800; }
    #trend { font-size:14px; margin-top:4px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    button { padding:8px 10px; border-radius:6px; cursor:pointer; border:1px solid #4b5563; background:#111827; color:#fff; }
    button:hover { background:#1f2937; }
    button[disabled] { background:#6b7280; border-color:#6b7280; color:#e5e7eb; cursor:not-allowed; }
    @media (prefers-color-scheme: light) {
      button { background:#2563eb; border-color:#1d4ed8; }
      button:hover { background:#1d4ed8; }
    }
    canvas { width:100%; height:72px; background:Canvas; border:1px solid #e5e7eb; border-radius:6px; }
    small.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .badge { display:inline-block; padding:2px 6px; border-radius:6px; font-size:12px; color:#fff; margin-left:6px; }
    .chip { padding:4px 10px; border-radius:999px; font-size:12px; border:1px solid #4b5563; }
    .chip.ok { background:#065f46; color:#fff; border-color:#065f46; }
    .chip.err { background:#7f1d1d; color:#fff; border-color:#7f1d1d; }
  </style>
</head>
<body>
  <header>
    <div class="row">
      <a href="/" style="text-decoration:none;color:inherit"><strong>Skylapse</strong></a>
      <span>/ Focus</span>
    </div>
    <div class="row">
      <button id="btn-start">Start Auto (S)</button>
      <button id="btn-stop" disabled>Stop Auto</button>
      <button id="btn-capture">Capture + Compute (C)</button>
      <button id="btn-recompute">Recompute (R)</button>
      <span id="auth-chip" class="chip">Checking…</span>
    </div>
  </header>
  <main>
    <section class="panel">
      <img id="image" alt="Latest" />
      <div style="margin-top:8px; font-size:12px; color:#666">
        <span id="meta"></span>
      </div>
    </section>
    <aside class="panel">
      <div id="score">— <span id="band" class="badge" style="background:#6b7280">INIT</span></div>
      <div id="trend">Turn direction: <strong id="dir">—</strong> • Delta: <strong id="delta">—</strong></div>
      <div style="margin-top:8px"><canvas id="spark" width="320" height="72"></canvas></div>
      <div style="margin-top:8px" class="row">
        <button id="btn-login">Login</button>
        <button id="btn-logout" style="display:none">Logout</button>
        <label class="row" style="gap:6px; align-items:center; margin-left:auto">
          <input type="checkbox" id="lock-ae"/> Lock AE
        </label>
        <label class="row" style="gap:6px; align-items:center">
          <input type="checkbox" id="lock-awb"/> Lock AWB
        </label>
      </div>
      <div id="out" style="margin-top:8px; font-size:12px; white-space:pre-wrap"></div>
      <div style="margin-top:8px">
        <div>Best so far: <strong id="best">—</strong></div>
      </div>
    </aside>
  </main>
  <dialog id="login-modal">
    <form method="dialog" style="min-width:320px; padding:16px">
      <h3>Login</h3>
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" style="width:100%"/>
      <div class="row" style="justify-content:flex-end; margin-top:12px">
        <button id="login-cancel" value="cancel">Cancel</button>
        <button id="login-submit" value="confirm">Login</button>
      </div>
      <div id="login-error" style="color:#b00; margin-top:8px; font-size:12px"></div>
    </form>
  </dialog>
  <script>
    const $ = (s)=>document.querySelector(s);
    const img = $('#image');
    const meta = $('#meta');
    const out = $('#out');
    const badge = $('#band');
    const scoreEl = $('#score');
    const dirEl = $('#dir');
    const deltaEl = $('#delta');
    const spark = $('#spark');
    const dlg = $('#login-modal');
    const loginErr = $('#login-error');

    let auto=false, tmr=null, logged=false, loginOpen=false;
    const history=[]; // {ts, score}

    function colorForScore(s){ if (s>300) return '#2b8a3e'; if (s>=100) return '#ca8a04'; return '#d33'; }
    function bandForScore(s){ if (s>300) return 'GOOD'; if (s>=100) return 'FAIR'; return 'POOR'; }

    async function getJSON(url){ const r=await fetch(url); if(!r.ok) throw new Error(String(r.status)); return r.json(); }
    async function postJSON(url, body){ const r=await fetch(url,{method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body||{})}); if(!r.ok) throw new Error(String(r.status)+' '+(await r.text())); return r.json(); }

    function ema(values, k=5){ let a=2/(k+1); let e=null; const out=[]; for (const v of values){ e = e==null? v : a*v + (1-a)*e; out.push(e);} return out; }

    function drawSpark(){
      const ctx = spark.getContext('2d');
      ctx.clearRect(0,0,spark.width,spark.height);
      if (history.length<2) return;
      const scores = history.map(h=>h.score);
      const min = Math.min(...scores), max=Math.max(...scores);
      const norm = scores.map(s=> (s - min) / (max-min + 1e-6));
      ctx.strokeStyle = '#888'; ctx.beginPath();
      norm.forEach((v,i)=>{ const x=i/(norm.length-1)*spark.width; const y=(1-v)*spark.height; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      ctx.stroke();
      // EMA overlay
      const em = ema(scores);
      const emn = em.map(s=> (s - min) / (max-min + 1e-6));
      ctx.strokeStyle = '#2563eb'; ctx.beginPath();
      emn.forEach((v,i)=>{ const x=i/(emn.length-1)*spark.width; const y=(1-v)*spark.height; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      ctx.stroke();
    }

    function updateUI(sample){
      if (!sample) return;
      const s = Number(sample.score||0);
      history.push({ ts: sample.ts || Date.now()/1000, score: s });
      if (history.length>30) history.shift();
      const col = colorForScore(s); const band = bandForScore(s);
      badge.textContent = band; badge.style.background = col;
      scoreEl.childNodes[0].nodeValue = `${s.toFixed(1)} `; // keep badge
      // trend
      const len = history.length;
      if (len>=5){
        const last5 = history.slice(-5).map(h=>h.score);
        const e = ema(last5);
        const slope = e[e.length-1]-e[0];
        const rel = (slope)/(Math.abs(e[0])+1e-6);
        const dir = slope>0 ? 'Better (keep turning)' : (slope<0 ? 'Worse (reverse slightly)' : 'Stable');
        dirEl.textContent = dir;
        deltaEl.textContent = `${(rel*100).toFixed(1)}%`;
      }
      drawSpark();
    }

    async function captureAndScore(){
      try {
        const body = { lock_ae: $('#lock-ae').checked, lock_awb: $('#lock-awb').checked };
        const data = await postJSON('/api/admin/capture_and_score', body);
        if (data && data.url){ img.src = data.url + `?t=${Date.now()}`; meta.textContent = new Date((data.ts||Date.now()/1000)*1000).toISOString(); }
        updateUI({ ts: data.ts, score: data.score });
      } catch (e){
        if (String(e).startsWith('401')) { requireLogin(); }
        out.textContent = 'Capture failed: ' + String(e);
      }
    }

    async function recompute(){
      try { const d = await getJSON('/api/admin/focus_score'); updateUI({ ts: Date.now()/1000, score: d.score }); }
      catch (e){ if (String(e).startsWith('Error: 401')) showLogin(); }
    }

    function startAuto(){ if (!logged){ requireLogin(); return; } if (auto) return; auto=true; $('#btn-start').disabled=true; $('#btn-stop').disabled=false; tmr=setInterval(captureAndScore, 500); }
    function stopAuto(){ auto=false; $('#btn-start').disabled=false; $('#btn-stop').disabled=true; if(tmr) clearInterval(tmr); }

    function setAuthUI(){
      const chip=$('#auth-chip');
      if (logged){ chip.textContent='Logged in'; chip.className='chip ok'; $('#btn-login').style.display='none'; $('#btn-logout').style.display='inline-block'; $('#btn-capture').disabled=false; $('#btn-recompute').disabled=false; $('#btn-start').disabled=false; }
      else { chip.textContent='Logged out'; chip.className='chip err'; $('#btn-login').style.display='inline-block'; $('#btn-logout').style.display='none'; $('#btn-capture').disabled=true; $('#btn-recompute').disabled=true; $('#btn-start').disabled=true; $('#btn-stop').disabled=true; }
    }
    function showLogin(){ if (loginOpen) return; loginOpen=true; loginErr.textContent=''; dlg.showModal(); $('#password').focus(); }
    function requireLogin(){ if (!logged) showLogin(); }
    async function doLogin(){
      try { await postJSON('/api/login', { password: $('#password').value }); dlg.close(); $('#btn-logout').disabled=false; }
      catch { loginErr.textContent='Invalid password'; return; }
      finally { loginOpen=false; }
      logged=true; setAuthUI(); out.textContent='';
    }
    async function doLogout(){ try { await postJSON('/api/logout', {}); } catch (e){} logged=false; setAuthUI(); stopAuto(); }

    // Bindings
    $('#btn-start').addEventListener('click', startAuto);
    $('#btn-stop').addEventListener('click', stopAuto);
    $('#btn-capture').addEventListener('click', captureAndScore);
    $('#btn-recompute').addEventListener('click', recompute);
    $('#btn-login').addEventListener('click', showLogin);
    $('#btn-logout').addEventListener('click', doLogout);
    $('#login-submit').addEventListener('click', (e)=>{ e.preventDefault(); doLogin(); });
    $('#login-cancel').addEventListener('click', ()=>dlg.close());
    window.addEventListener('keydown', (e)=>{
      if (e.key==='s'||e.key==='S') startAuto();
      if (e.key==='c'||e.key==='C') captureAndScore();
      if (e.key==='r'||e.key==='R') recompute();
    });

    async function checkAuth(){ try{ await getJSON('/api/admin/health'); logged=true; }catch{ logged=false; } setAuthUI(); }
    // Initial load
    (async()=>{ await checkAuth(); try{ const d = await getJSON('/api/latest'); if (d && d.image_url){ img.src=d.image_url; meta.textContent=d.captured_at||''; } }catch{} })();
  </script>
</body>
</html>
